# docker-compose.yml
# MongoDB removed — data lives in InMemoryStore.
# Redis is still used for pub/sub event bus between services.
# Set STORE_PERSIST_PATH in .env to persist data across restarts.

version: '3.9'

services:

  # ── Redis (pub/sub only — NOT for data storage) ───────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-gmana-redis}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-gmana-redis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Optional: persist store to file inside the container
      - STORE_PERSIST_PATH=/app/data/store.json
    volumes:
      - whatsapp-session:/app/whatsapp-session
      - store-data:/app/data
      - logs:/app/logs
    ports:
      - '3000:3000'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=http://backend:3000/api
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis-data:
  whatsapp-session:
  store-data:        # Persists the JSON store file across container restarts
  logs:
